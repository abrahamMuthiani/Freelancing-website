<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="config.js"></script>
  <title>Admin Dashboard - Users</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6">

  <h1 class="text-3xl font-bold text-green-600 mb-6">Admin Dashboard - Users</h1>

  <!-- Filter Dropdown -->
  <div class="mb-4">
    <select id="userFilter" class="border rounded px-4 py-2 shadow hover:border-green-500 transition">
      <option value="">All Users</option>
      <option value="client">Clients</option>
      <option value="freelancer">Freelancers</option>
    </select>
  </div>

  <!-- Users Table -->
  <div class="overflow-x-auto bg-white rounded shadow">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-green-50">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-600 uppercase tracking-wider">Name</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-600 uppercase tracking-wider">Email</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-600 uppercase tracking-wider">Role</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-600 uppercase tracking-wider">Joined</th>
          <th class="px-6 py-3 text-center text-xs font-medium text-gray-600 uppercase tracking-wider">Actions</th>
        </tr>
      </thead>
      <tbody id="usersContainer" class="bg-white divide-y divide-gray-200">
        <!-- User rows will be injected here -->
      </tbody>
    </table>
  </div>

  <script>
    const usersContainer = document.getElementById('usersContainer');
    const userFilter = document.getElementById('userFilter');

    // Format date
    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    // Fetch and display users
    async function loadUsers(role = '') {
      try {
        let url = 'http://localhost:3000/api/users';
        if (role) url += '?role=' + role;

        const res = await fetch(url);
        const users = await res.json();

        if (!users.length) {
          usersContainer.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-gray-500">No users found.</td></tr>`;
          return;
        }

        usersContainer.innerHTML = users.map(user => `
          <tr class="hover:bg-gray-50 transition">
            <td class="px-6 py-4 whitespace-nowrap">${user.firstName} ${user.lastName || ''}</td>
            <td class="px-6 py-4 whitespace-nowrap">${user.email}</td>
            <td class="px-6 py-4 whitespace-nowrap capitalize">${user.role}</td>
            <td class="px-6 py-4 whitespace-nowrap">${formatDate(user.createdAt)}</td>
            <td class="px-6 py-4 whitespace-nowrap text-center flex gap-2 justify-center">
              <button onclick="toggleBan('${user._id}', ${user.isBanned || false})"
                class="px-3 py-1 rounded ${user.isBanned ? 'bg-green-500 hover:bg-green-600' : 'bg-red-500 hover:bg-red-600'} text-white">
                ${user.isBanned ? 'Unban' : 'Ban'}
              </button>
              <button onclick="flagUser('${user._id}', ${user.isFlagged || false})"
                class="px-3 py-1 rounded ${user.isFlagged ? 'bg-gray-500 hover:bg-gray-600' : 'bg-yellow-500 hover:bg-yellow-600'} text-white">
                ${user.isFlagged ? 'Unflag' : 'Flag'}
              </button>
            </td>
          </tr>
        `).join('');

      } catch (err) {
        console.error(err);
        usersContainer.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-red-500">Error loading users.</td></tr>`;
      }
    }

    // Ban/Unban user
    async function toggleBan(userId, isBanned) {
      try {
        const res = await fetch(`http://localhost:3000/api/users/${userId}/ban`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ isBanned: !isBanned })
        });
        const data = await res.json();
        if (res.ok) loadUsers(userFilter.value);
        else alert('Error: ' + data.message);
      } catch (err) {
        console.error(err);
        alert('Error updating ban status.');
      }
    }

    // Flag/Unflag user
    async function flagUser(userId, isFlagged) {
      try {
        const res = await fetch(`http://localhost:3000/api/users/${userId}/flag`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ isFlagged: !isFlagged })
        });
        const data = await res.json();
        if (res.ok) loadUsers(userFilter.value);
        else alert('Error: ' + data.message);
      } catch (err) {
        console.error(err);
        alert('Error updating flag status.');
      }
    }

    // Filter change
    userFilter.addEventListener('change', () => loadUsers(userFilter.value));

    // Initial load
    loadUsers();
  </script>

</body>
</html>
